<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YGO Hand Probability</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

  <style>
    body {
      background-color: #f5f5f5;
    }

    nav {
      background-color: #b71c1c;
    }

    nav .brand-logo {
      padding-left: 20px;
    }

    .section-title {
      color: #b71c1c;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .deck-counter {
      font-size: 15px;
      color: #555;
      margin-bottom: 20px;
    }

    .deck-counter strong {
      font-size: 18px;
      color: #b71c1c;
    }

    .add-card-form {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .add-card-form .input-field {
      margin: 0;
      flex: 1;
      min-width: 140px;
    }

    .add-card-form .select-wrapper-sm {
      min-width: 80px;
    }

    .add-card-form .select-wrapper-md {
      min-width: 120px;
    }

    .deck-table-wrap {
      overflow-x: auto;
    }

    table.deck-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    table.deck-table thead tr {
      background-color: #b71c1c;
      color: white;
    }

    table.deck-table thead th {
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }

    table.deck-table tbody tr:nth-child(even) {
      background-color: #fafafa;
    }

    table.deck-table tbody tr:hover {
      background-color: #fff3f3;
    }

    table.deck-table tbody td {
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
    }

    table.deck-table .td-qty {
      font-weight: 600;
      width: 50px;
    }

    table.deck-table .td-type {
      width: 90px;
    }

    .type-badge {
      display: inline-block;
      border-radius: 10px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .type-monster { background-color: #fff3cd; color: #856404; }
    .type-spell   { background-color: #d1f0d6; color: #1a6b30; }
    .type-trap    { background-color: #f8d7da; color: #842029; }

    .remove-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
      padding: 0;
      line-height: 1;
    }

    .remove-icon-btn:hover {
      color: #b71c1c;
    }

    .empty-table-row td {
      text-align: center;
      color: #bbb;
      padding: 24px 0;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .add-card-form { flex-direction: column; }
      .add-card-form .input-field,
      .add-card-form .select-wrapper-sm,
      .add-card-form .select-wrapper-md { min-width: 100%; width: 100%; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-wrapper">
      <a href="#" class="brand-logo">
        <i class="material-icons" style="vertical-align:middle; margin-right:8px;">style</i>
        YGO Hand Sim
      </a>
    </div>
  </nav>

  <div class="container" style="margin-top: 30px; margin-bottom: 60px;">
    <div class="row">
      <div class="col s12">
        <div class="card-panel" style="border-left: 4px solid #b71c1c;">

          <h5 class="section-title">
            <i class="material-icons" style="vertical-align:middle;">library_books</i>
            Deck Builder
          </h5>

          <p class="deck-counter">
            Total Cards in Deck: <strong id="deck-total">0</strong> / 60
          </p>

          <div class="add-card-form">
            <div class="input-field">
              <input id="new-card-name" type="text" placeholder="e.g. Ash Blossom" />
              <label for="new-card-name">Card Name</label>
            </div>

            <div class="input-field select-wrapper-sm">
              <select id="new-card-qty">
                <option value="1">1x</option>
                <option value="2">2x</option>
                <option value="3" selected>3x</option>
              </select>
              <label>Qty</label>
            </div>

            <div class="input-field select-wrapper-md">
              <select id="new-card-type">
                <option value="Monster">Monster</option>
                <option value="Spell">Spell</option>
                <option value="Trap">Trap</option>
              </select>
              <label>Type</label>
            </div>

            <button class="btn red darken-3 waves-effect waves-light" onclick="addCard()">
              <i class="material-icons left">add</i>Add
            </button>
          </div>

          <div class="deck-table-wrap">
            <table class="deck-table">
              <thead>
                <tr>
                  <th>Card Name</th>
                  <th class="td-type">Type</th>
                  <th class="td-qty">Qty</th>
                  <th style="width:36px;"></th>
                </tr>
              </thead>
              <tbody id="deck-tbody">
                <tr class="empty-table-row">
                  <td colspan="4">No cards added yet.</td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

  <script>
    // { name: { qty: number, type: string } }
    let deck = {};

    document.addEventListener('DOMContentLoaded', () => {
      M.FormSelect.init(document.querySelectorAll('select'));
      document.getElementById('new-card-name').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addCard();
      });
    });

    function addCard() {
      const nameInput = document.getElementById('new-card-name');
      const name = nameInput.value.trim();
      if (!name) {
        M.toast({ html: 'Please enter a card name.', classes: 'red darken-3' });
        return;
      }

      const qty  = parseInt(document.getElementById('new-card-qty').value);
      const type = document.getElementById('new-card-type').value;

      if (deckTotal() - (deck[name] ? deck[name].qty : 0) + qty > 60) {
        M.toast({ html: 'Deck cannot exceed 60 cards.', classes: 'red darken-3' });
        return;
      }

      deck[name] = { qty, type };
      nameInput.value = '';
      M.FormSelect.init(document.querySelectorAll('select'));
      renderDeck();
    }

    function removeCard(name) {
      delete deck[name];
      renderDeck();
    }

    function deckTotal() {
      return Object.values(deck).reduce((s, c) => s + c.qty, 0);
    }

    function renderDeck() {
      const total = deckTotal();
      document.getElementById('deck-total').textContent = total;

      const tbody = document.getElementById('deck-tbody');
      const names = Object.keys(deck);

      if (names.length === 0) {
        tbody.innerHTML = '<tr class="empty-table-row"><td colspan="4">No cards added yet.</td></tr>';
        return;
      }

      tbody.innerHTML = names.map(name => {
        const { qty, type } = deck[name];
        return `
          <tr>
            <td>${htmlEsc(name)}</td>
            <td class="td-type"><span class="type-badge type-${type.toLowerCase()}">${type}</span></td>
            <td class="td-qty">${qty}x</td>
            <td>
              <button class="remove-icon-btn" onclick="removeCard('${jsEsc(name)}')" title="Remove">
                <i class="material-icons small">close</i>
              </button>
            </td>
          </tr>`;
      }).join('');
    }

    function jsEsc(str)   { return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
    function htmlEsc(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  </script>

</body>
</html>
